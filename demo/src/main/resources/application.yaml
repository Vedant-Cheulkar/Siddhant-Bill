spring:
  application:
    name: billing-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  api:
    version: v1
  pdf:
    storage-path: ${PDF_STORAGE_PATH:./data/documents}
    logo-path: ${PDF_LOGO_PATH:classpath:static/assets/default-logo.png}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-256-bit-secret-key-for-production-use}
    access-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_DAYS:7}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true
    try-it-out-enabled: true
  show-actuator: false
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlationId}] %msg%n"
