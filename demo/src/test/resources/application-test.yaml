spring:
  datasource:
    url: jdbc:h2:mem:billing_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-minimum-32-characters-long
  pdf:
    storage-path: ${java.io.tmpdir}/billing-test-documents

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
